name: Deploy Contracts — Polygon Mainnet

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY-MAINNET to confirm production mainnet deployment"
        required: true
      verify:
        description: "Verify contracts on Polygonscan?"
        type: boolean
        default: true

jobs:
  deploy:
    name: Deploy to Polygon Mainnet
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DEPLOY-MAINNET'
    environment: polygon-mainnet

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Compile contracts
        run: npx hardhat compile --quiet

      - name: Run tests before deploy
        run: npx hardhat test --network hardhat

      - name: Deploy to Polygon Mainnet
        id: deploy
        run: npx hardhat run scripts/deploy.js --network polygon
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.PROD_DEPLOYER_PRIVATE_KEY }}
          POLYGON_RPC_URL: ${{ secrets.PROD_POLYGON_RPC_URL }}
          MANAGER_WALLET: ${{ secrets.MANAGER_WALLET }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}

      - name: Verify contracts on Polygonscan
        if: github.event.inputs.verify == 'true'
        run: npx hardhat run scripts/polygonscan-verify.js --network polygon
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.PROD_DEPLOYER_PRIVATE_KEY }}
          POLYGON_RPC_URL: ${{ secrets.PROD_POLYGON_RPC_URL }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mainnet-deployment-${{ github.run_number }}
          path: deployments/mainnet.json
          retention-days: 90

      - name: Commit deployment addresses
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/
          git diff --cached --quiet || git commit -m "chore: mainnet deployment addresses [run #${{ github.run_number }}]"
          git push

      - name: 🎉 Production Deployment Summary
        run: |
          echo "╔════════════════════════════════════════════╗"
          echo "║  ✅ PRODUCTION DEPLOYMENT COMPLETE         ║"
          echo "╚════════════════════════════════════════════╝"
          echo ""
          echo "Check deployment output above for contract addresses"
          echo "Verify on Polygonscan: https://polygonscan.io/"
          echo ""
          echo "Next steps:"
          echo "1. Update .env.production with new contract addresses"
          echo "2. Run: node scripts/init-mainnet.js"
          echo "3. Verify all contracts on https://polygonscan.io"
          echo "4. Begin Phase 6.3: Health Check"
